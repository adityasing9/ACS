<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat System</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<div class="background"></div>

<div class="app">
    
    <header>
        <div class="title">💬 Anonymous Chat System</div>
        <div id="me" class="me"></div>
    </header>

    <div id="messages" class="messages"></div>

    <div class="chat-controls">
        <input id="text" placeholder="Type a message..." autocomplete="off">
        <button onclick="send()">➤</button>
    </div>

    <div class="rename">
        <input id="newname" placeholder="Change username">
        <button onclick="changeName()">Update</button>
    </div>

</div>



<script src="/static/ui.js"></script>
</body>
</html>
